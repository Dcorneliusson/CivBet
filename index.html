<!DOCTYPE html>
<html>
<head>
<title>CivBet</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>💎 CivBet</h1>

<div class="bank-box">
<h2>🏦 Deposit Diamonds</h2>

<p>
To deposit diamonds into your CivBet account, send the amount of diamonds you would like to deposit to:
</p>

<h2>HS-3495</h2>
<h3>Monument Bank</h3>
</div>

<hr>

<div class="events-box">

<h2>🎯 Events To Bet On</h2>

<div class="event">
<h3>Will the war end this week?</h3>

<p>Yes Odds: 1.8 | No Odds: 2.1</p>

<input id="betAmount" placeholder="Bet diamonds">

<button onclick="bet('yes')">Bet Yes</button>
<button onclick="bet('no')">Bet No</button>
</div>

</div>

<h2 id="balanceDisplay">Balance: 100 Diamonds</h2>

<h3 id="result"></h3>

<script src="app.js"></script>

</body>
</html>
